<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profil Edukator - ILHAMI</title>
    <link rel="stylesheet" href="/css/tailwind.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <link rel="stylesheet" href="/css/edukator-mobile.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>

  <body class="h-full" data-page="profil" data-view="edukator-mobile">
    <div class="edu-shell h-full w-full overflow-auto hide-scrollbar">
      <div class="edu-frame h-full">

        <header class="edu-topbar">
          <div class="edu-icon-btn is-brand"><span class="material-symbols-outlined fill">badge</span></div>
          <h1 class="edu-topbar-title">Akun &amp; Data Diri</h1>
          <a href="/profil-edukator" class="edu-icon-btn" aria-label="Profil">
            <span class="material-symbols-outlined fill">person</span>
          </a>
        </header>

        <main class="edu-main flex-1 overflow-auto hide-scrollbar" style="padding-bottom:calc(150px + env(safe-area-inset-bottom,0px));">

          <div style="display:flex;gap:10px;">
            <button type="submit" form="profilForm" id="profilSaveBtn" class="edu-btn-primary" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;">
              <span class="material-symbols-outlined" style="font-size:18px;">save</span> Simpan
            </button>
            <button type="button" id="logoutBtn" class="edu-btn-ghost" style="flex:1;display:flex;align-items:center;justify-content:center;gap:6px;">
              <span class="material-symbols-outlined" style="font-size:18px;">logout</span> Logout
            </button>
          </div>

          <section class="edu-card" style="padding:18px;">
            <div class="edu-section-title-main" style="margin-bottom:10px;">
              <span class="material-symbols-outlined">fingerprint</span> Login Biometrik
            </div>
            <p id="biometricStatusText" style="font-size:12.5px;color:var(--edu-ink-soft);margin-bottom:14px;line-height:1.6;">Masuk lebih cepat dengan sidik jari/wajah di perangkat ini.</p>
            <button type="button" id="biometricToggleBtn" class="edu-btn-primary">
              Aktifkan Login Biometrik
            </button>
          </section>

          <form id="profilForm" style="display:flex;flex-direction:column;gap:14px;">
            <section class="edu-card" style="padding:18px;">
              <div class="edu-section-title-main" style="margin-bottom:14px;">
                <span class="material-symbols-outlined">contact_page</span> Data Diri
              </div>
              <div style="display:flex;flex-direction:column;gap:12px;">
                <label class="edu-field">
                  <span class="edu-field-label">Nama Lengkap</span>
                  <input id="profilNama" type="text" class="edu-input" placeholder="Nama lengkap">
                </label>
                <label class="edu-field">
                  <span class="edu-field-label">Nomor Telepon</span>
                  <input id="profilTelepon" type="text" class="edu-input" placeholder="08xxxxxxxxxx">
                </label>
                <label class="edu-field">
                  <span class="edu-field-label">Alamat</span>
                  <textarea id="profilAlamat" rows="3" class="edu-textarea" placeholder="Alamat lengkap"></textarea>
                </label>
                <label class="edu-field">
                  <span class="edu-field-label">Pendidikan Terakhir</span>
                  <input id="profilPendidikan" type="text" class="edu-input" placeholder="Contoh: S1 Pendidikan Matematika">
                </label>
              </div>
            </section>

            <section class="edu-card" style="padding:18px;">
              <div class="edu-section-title-main" style="margin-bottom:14px;">
                <span class="material-symbols-outlined">mail</span> Email
              </div>
              <label class="edu-field">
                <span class="edu-field-label">Email Akun</span>
                <input id="profilEmail" type="email" class="edu-input" placeholder="nama@email.com">
              </label>
            </section>

            <section class="edu-card" style="padding:18px;">
              <div class="edu-section-title-main" style="margin-bottom:14px;">
                <span class="material-symbols-outlined">lock</span> Password
              </div>
              <div style="display:flex;flex-direction:column;gap:12px;">
                <label class="edu-field">
                  <span class="edu-field-label">Password Baru</span>
                  <input id="profilPassword" type="password" class="edu-input" placeholder="Minimal 6 karakter">
                </label>
                <label class="edu-field">
                  <span class="edu-field-label">Konfirmasi Password</span>
                  <input id="profilPasswordConfirm" type="password" class="edu-input" placeholder="Ulangi password baru">
                </label>
              </div>
              <p style="font-size:11.5px;color:var(--edu-ink-mute);margin-top:10px;">Kosongkan jika tidak ingin mengubah password.</p>
            </section>
          </form>
        </main>

        <footer class="edukator-footer" id="edukatorFooterNav" aria-label="Navigasi Edukator"></footer>
      </div>
    </div>

    <script src="/js/sidebar.js"></script>
    <script src="/js/edukator-footer.js"></script>
    <script src="/js/biometric.js"></script>
    <script src="/js/profil-edukator.js"></script>
  </body>
</html>
